# Alembic configuration for PrepVault.
#
# The database URL is NOT set here — it is resolved at runtime from the app's
# settings (APP_MODE / DATABASE_URL) inside app/migrations/env.py, so local
# (SQLite) and cloud (Postgres) both migrate from one source of truth.

[alembic]
script_location = app/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
